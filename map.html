<!DOCTYPE html>
<html>
<head>
    <title>سیستم مدیریت ناوگان</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; font-family: Arial; background: #1a1a2e; }
        #header {
            background: #16213e;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }
        #map { height: calc(100vh - 60px); }
        #info {
            position: absolute;
            top: 80px;
            right: 10px;
            background: #16213e;
            color: white;
            padding: 15px;
            border-radius: 10px;
            z-index: 1000;
            min-width: 200px;
        }
    </style>
</head>
<body>
    <div id="header">🚛 سیستم مدیریت ناوگان - زنده</div>
    <div id="info">
        <b>خودرو ۱</b><br>
        سرعت: <span id="speed">-</span> km/h<br>
        عرض جغرافیایی: <span id="lat">-</span><br>
        طول جغرافیایی: <span id="lon">-</span><br>
        آخرین بروزرسانی: <span id="time">-</span>
    </div>
    <div id="map"></div>

    <script>
        // راه‌اندازی نقشه
        var map = L.map('map').setView([35.6892, 51.3890], 13);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: 'OpenStreetMap'
        }).addTo(map);

        // آیکون خودرو
        var truckIcon = L.divIcon({
            html: '🚛',
            iconSize: [30, 30],
            className: ''
        });

        var marker = L.marker([35.6892, 51.3890], {icon: truckIcon}).addTo(map);
        var path = L.polyline([], {color: 'red'}).addTo(map);

        // هر ۲ ثانیه موقعیت جدید بگیر
        function updateLocation() {
            fetch('http://127.0.0.1:8000/location/1')
                .then(r => r.json())
                .then(data => {
                    var lat = data.latitude;
                    var lon = data.longitude;
                    
                    marker.setLatLng([lat, lon]);
                    path.addLatLng([lat, lon]);
                    map.setView([lat, lon]);
                    
                    document.getElementById('speed').textContent = data.speed;
                    document.getElementById('lat').textContent = lat.toFixed(4);
                    document.getElementById('lon').textContent = lon.toFixed(4);
                    document.getElementById('time').textContent = new Date().toLocaleTimeString('fa');
                });
        }

        updateLocation();
        setInterval(updateLocation, 2000);
    </script>
</body>
</html>
